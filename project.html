<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project | Yashwanth</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="project-detail">
    <div class="site-frame">
      <header class="topbar">
        <a class="brandmark" id="brand-link" href="./index.html">Home</a>
        <button
          class="menu-toggle"
          id="menu-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="top-nav"
          aria-label="Open navigation menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="topnav" id="top-nav"></nav>
      </header>

      <main class="page-panel page-panel-wide">
        <a
          class="back-link"
          href="./research.html"
          aria-label="Back to Research"
          title="Back to Research"
        >
          <span aria-hidden="true">&#8592;</span>
        </a>

        <section class="page-hero">
          <p class="section-kicker" id="project-detail-kicker"></p>
          <h1 id="project-detail-title"></h1>
          <p id="project-detail-summary" class="page-intro"></p>
        </section>

        <section class="project-detail-layout">
          <div class="detail-main">
            <div class="media-frame" id="project-detail-media"></div>
            <div class="detail-richtext" id="project-detail-body"></div>
          </div>
          <aside class="detail-side">
            <div class="detail-side-block" id="project-detail-links-section">
              <p class="section-label">Related links</p>
              <div class="action-group" id="project-detail-links"></div>
            </div>
            <div
              class="detail-side-block"
              id="project-detail-publications-section"
            >
              <p class="section-label">Related publications</p>
              <div
                class="stack-list compact-stack"
                id="project-detail-publications"
              ></div>
            </div>
          </aside>
        </section>
      </main>
    </div>

    <script src="./site-data.js"></script>
    <script src="./research-data/research-data.js"></script>
    <script src="./page.js"></script>
  </body>
</html>
