<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog | Yashwanth</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="blog">
    <div class="site-frame">
      <header class="topbar">
        <a class="brandmark" id="brand-link" href="./index.html">Home</a>
        <button
          class="menu-toggle"
          id="menu-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="top-nav"
          aria-label="Open navigation menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="topnav" id="top-nav">
          <button class="theme-toggle" id="theme-toggle" type="button">Dark</button>
        </nav>
      </header>

      <div class="research-layout">
        <!-- EDIT: Left jump card -->
        <aside class="section-jump-card">
          <p class="section-label">Jump</p>
          <nav class="section-jump-nav" aria-label="Blog page sections">
            <a href="#blog-notes-section">Notes</a>
            <a href="#blog-gallery-section">Personal Archive</a>
          </nav>
        </aside>

        <main class="blog-layout">
          <!-- EDIT: Notes tile -->
          <section class="blog-tile-section" id="blog-notes-section">
            <div class="section-heading">
              <h2>Notes</h2>
            </div>
            <div class="stack-list" id="blog-notes-list"></div>
          </section>

          <!-- EDIT: Personal archive tile -->
          <section class="blog-tile-section" id="blog-gallery-section">
            <div class="section-heading">
              <h2>Personal Archive</h2>
            </div>
            <p class="page-intro">
              Personal images and informal snapshots from research life will live here soon.
            </p>
          </section>
        </main>
      </div>
    </div>

    <script src="./site-data.js"></script>
    <script src="./blog-data/blog-data.js"></script>
    <script>
      (function () {
        var brandNode = document.getElementById("brand-link");
        var navNode = document.getElementById("top-nav");
        var notesNode = document.getElementById("blog-notes-list");
        var storedTheme;
        var button = document.getElementById("theme-toggle");
        var menuButton = document.getElementById("menu-toggle");
        var topbar = document.querySelector(".topbar");
        var profile = window.siteData && window.siteData.profile;
        var navigation = (window.siteData && window.siteData.navigation) || [];
        var blogData = window.blogData || {};

        function filled(value) {
          return Array.isArray(value) ? value.length > 0 : Boolean(value && String(value).trim());
        }

        function defaultTheme() {
          return window.matchMedia("(max-width: 980px)").matches ? "dark" : "light";
        }

        function syncMenuState(isOpen) {
          if (!topbar || !menuButton) {
            return;
          }

          topbar.classList.toggle("menu-open", isOpen);
          menuButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
          menuButton.setAttribute("aria-label", isOpen ? "Close navigation menu" : "Open navigation menu");
        }

        function appendActions(parent, actions) {
          var validActions = (actions || []).filter(function (action) {
            return filled(action.title) && filled(action.href);
          });

          if (!validActions.length) {
            return;
          }

          var group = document.createElement("div");
          group.className = "action-group";

          validActions.forEach(function (action) {
            var link = document.createElement("a");
            link.className = "action-link";
            link.href = action.href;
            link.textContent = action.title;
            link.style.background = action.background || "var(--action-bg)";
            link.style.color = action.color || "var(--action-ink)";

            if (action.href.indexOf("http") === 0) {
              link.target = "_blank";
              link.rel = "noreferrer";
            }

            group.appendChild(link);
          });

          parent.appendChild(group);
        }

        try {
          storedTheme = localStorage.getItem("theme-preference");
        } catch (error) {
          storedTheme = null;
        }

        document.body.dataset.theme = storedTheme || defaultTheme();

        if (brandNode && profile && filled(profile.name)) {
          brandNode.textContent = profile.name;
        }

        if (navNode && navigation.length) {
          navigation.forEach(function (item) {
            var link = document.createElement("a");
            link.href = item.href;
            link.textContent = item.label;
            if (item.page === "blog") {
              link.className = "is-active";
            }
            navNode.insertBefore(link, button);
          });

          navNode.addEventListener("click", function (event) {
            if (event.target && event.target.tagName && event.target.tagName.toLowerCase() === "a") {
              syncMenuState(false);
            }
          });
        }

        if (notesNode) {
          (blogData.notes || [])
            .filter(function (item) {
              return filled(item.title);
            })
            .forEach(function (item) {
              var article = document.createElement("article");
              article.className = "card";

              var body = document.createElement("div");
              body.className = "card-body";

              var head = document.createElement("div");
              head.className = "card-head";

              var title = document.createElement("h3");
              title.textContent = item.title || "";

              var meta = document.createElement("p");
              meta.className = "item-meta";
              meta.textContent = item.meta || "";
              meta.hidden = !filled(item.meta);

              var copy = document.createElement("p");
              copy.className = "item-copy";
              copy.textContent = item.description || "";
              copy.hidden = !filled(item.description);

              head.appendChild(title);
              head.appendChild(meta);
              body.appendChild(head);
              body.appendChild(copy);
              article.appendChild(body);
              appendActions(article, item.actions);
              notesNode.appendChild(article);
            });
        }

        if (!button) {
          return;
        }

        if (menuButton) {
          menuButton.addEventListener("click", function () {
            syncMenuState(!topbar.classList.contains("menu-open"));
          });

          window.addEventListener("resize", function () {
            if (!window.matchMedia("(max-width: 720px)").matches) {
              syncMenuState(false);
            }
          });
        }

        function syncThemeButton() {
          var isDark = document.body.dataset.theme === "dark";
          button.textContent = isDark ? "Light" : "Dark";
          button.classList.toggle("is-active", isDark);
        }

        button.addEventListener("click", function () {
          var nextTheme = document.body.dataset.theme === "dark" ? "light" : "dark";
          document.body.dataset.theme = nextTheme;

          try {
            localStorage.setItem("theme-preference", nextTheme);
          } catch (error) {}

          syncThemeButton();
        });

        syncThemeButton();
      })();
    </script>
  </body>
</html>
