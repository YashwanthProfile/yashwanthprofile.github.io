<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Note | Yashwanth</title>
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github.min.css"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css"
      media="(prefers-color-scheme: dark)"
    />
  </head>
  <body data-page="note-detail">
    <div class="site-frame">
      <header class="topbar">
        <a class="brandmark" id="brand-link" href="./index.html">Home</a>
        <nav class="topnav" id="top-nav"></nav>
      </header>

      <div class="note-layout">
        <aside class="section-jump-card note-jump-card" id="note-outline-section">
          <p class="section-label">Outline</p>
          <nav class="section-jump-nav note-jump-nav" id="note-outline-nav" aria-label="Article outline"></nav>
        </aside>

        <main class="page-panel page-panel-wide note-detail-panel">
          <a
            class="back-link"
            href="./blog.html#blog-notes-section"
            aria-label="Back to Notes"
            title="Back to Notes"
          >
            <span aria-hidden="true">&#8592;</span>
          </a>

          <article class="note-article" id="note-article-top">
            <header class="note-article-header">
              <p class="section-kicker" id="note-detail-meta"></p>
              <h1 id="note-detail-title"></h1>
              <p id="note-detail-summary" class="page-intro"></p>
            </header>

            <div class="action-group" id="note-detail-actions"></div>
            <div class="note-article-body" id="note-detail-body"></div>
          </article>
        </main>
      </div>
    </div>

    <script src="./site-data.js"></script>
    <script src="./blog-data/blog-data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <script src="./page.js"></script>
  </body>
</html>
